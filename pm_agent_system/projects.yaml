# PM Bot — 프로젝트 정의
# 각 프로젝트: repo_path (필수), spec_path (선택), pmbot_dir (선택)
#
# pmbot_dir 미지정 시 → {repo_path}/.pmbot/ 자동 사용
# pmbot_dir 지정 시   → 해당 디렉토리를 .pmbot/ 로 사용 (하위호환용)
#
# 디렉토리 구조 (pmbot_dir 기준):
#   task_queue/   — .md 태스크 파일 투입
#   logs/tasks/   — Claude CLI stdout/stderr/combined 로그
#   completed/    — 완료된 태스크 JSON
#   state/        — git_state.json
#   handoffs/     — Handoff 마크다운 파일

default_project: vda5050

projects:
  vda5050:
    repo_path: /Users/tg/vda5050_sim_v2
    spec_path: /Users/tg/vda5050_sim_v2/CLAUDE.md
    # 기존 pm_agent_system/ 디렉토리를 .pmbot/로 사용 (하위호환)
    pmbot_dir: /Users/tg/vda5050_sim_v2/pm_agent_system

  lidear:
    repo_path: /Users/tg/LiDEAR
    spec_path: /Users/tg/LiDEAR/CLAUDE.md
    # pmbot_dir 미지정 → /Users/tg/LiDEAR/.pmbot/ 자동 사용

  # 새 프로젝트 예시 — pmbot_dir 미지정 시 repo/.pmbot/ 자동 사용
  # ios_capture:
  #   repo_path: /Users/tg/ios_capture
  #   spec_path: /Users/tg/ios_capture/CLAUDE.md
