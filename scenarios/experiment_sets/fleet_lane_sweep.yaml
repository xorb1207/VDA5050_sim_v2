name: fleet_lane_policy_sweep
description: "fleet size × lane policy 배치 실험. one_way/bidirectional, 1-lane/2-lane 비교."

base_map_file: maps/sample_fab.json
runtime_seconds: 300
tick_hz: 50
random_seed: 42

task_profile:
  type: hotspot
  generator: fixed_interval
  interval_seconds: 10
  pickup_nodes:
    - node_work_01
  dropoff_nodes:
    - node_work_02
  hotspot_nodes:
    - node_work_01

matrix:
  fleet_size: [3, 5, 8]
  lane_mode: [one_way, bidirectional]
  lane_count: [1, 2]
  reservation_mode: [next_node, lookahead_n]
  lookahead_depth: [1, 2]

constraints:
  - if:
      reservation_mode: next_node
    then:
      lookahead_depth: 1

outputs:
  directory: outputs/reports/fleet_lane_policy_sweep
  save_kpi_json: true
  save_kpi_csv: true
  save_node_stats: true
  save_summary_table: true
